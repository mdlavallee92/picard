url: https://ohdsi.github.io/picard/
template:
  bootstrap: 5

home:
  title: picard - RWE Pipelining Tool
  description: A pipeline tool for RWE analysis using the OHDSI stack

navbar:
  structure:
    left: [home, intro, reference, articles, news]
    right: [search, github]
  components:
    home:
      icon: fa-home
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      href: articles/index.html
    news:
      text: Changelog
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/mdlavallee92/picard

reference:
  - title: "Core Classes"
    desc: "Main R6 classes for package functionality"
    contents:
      - CohortDef
      - CohortManifest
      - ConceptSetDef
      - ConceptSetManifest
      - ContributorLine
      - DbConfigBlock
      - ExecOptions
      - ExecutionSettings
      - StudyMeta
      - UlyssesStudy

  - title: "Creation Functions"
    desc: "Functions for creating objects and structures (make*)"
    contents:
      - makeExecOptions
      - makePrintFriendlyFile
      - makeSrcFile
      - makeSrcSqlFile
      - makeStudyMeta
      - makeTaskFile
      - makeUlyssesStudySettings

  - title: "Initialization Functions"
    desc: "Functions for initializing components (init*)"
    contents:
      - initAgentMode
      - initializeRenv

  - title: "Build Functions"
    desc: "Functions for building study components (build*)"
    contents:
      - buildComplementCohort
      - buildStudyHub
      - buildSubsetCohortDemographic
      - buildSubsetCohortTemporal
      - buildUnionCohort

  - title: "Create Functions"
    desc: "Functions for creating new objects (create*)"
    contents:
      - createAgentBranch
      - createBlankCohortsLoadFile
      - createBlankConceptSetsLoadFile
      - createExecutionSettings
      - createExecutionSettingsFromConfig
      - createPullRequest

  - title: "Execution Functions"
    desc: "Functions for executing study tasks (exec*)"
    contents:
      - execStudyPipeline

  - title: "Configuration Functions"
    desc: "Functions for configuration and setup (set*)"
    contents:
      - getTaskRunSummary
      - setAtlasConnection
      - setContributor
      - setDbConfigBlock
      - setOutputFolder

  - title: "Loading Functions"
    desc: "Functions for loading and importing data (load*)"
    contents:
      - loadCohortManifest
      - loadConceptSetManifest

  - title: "Utility Functions"
    desc: "Other utility and helper functions"
    contents:
      - agentSaveWork
      - cleanColumnNames
      - clearPendingPR
      - displayTaskStatusReport
      - documentDependencies
      - formatFloats
      - formatPercentages
      - generateCohorts
      - importAndBind
      - importAtlasCohorts
      - importAtlasConceptSets
      - launchCohortsLoadEditor
      - launchConceptSetsLoadEditor
      - orchestratePipelineExport
      - pivotForComparison
      - placeHolderExecOptions
      - prepareDisseminationData
      - recordTaskExecution
      - resetCohortManifest
      - resetConceptSetManifest
      - restoreEnvironment
      - reviewExportSchema
      - saveWork
      - shouldRerunTask
      - snapshotEnvironment
      - standardizeDataTypes
      - templateAtlasCredentials
      - testStudyPipeline
      - testStudyTask
      - updateStudyVersion
      - validateCohortResults
      - validateConfigYaml
      - validateStudyTask
      - validateUlyssesStructure
      - visualizeCohortDependencies
      - zipAndArchive

development:
  mode: "auto"
